dbs:
  - path: /data/brand3.sqlite3
    replicas:
      - type: s3
        bucket: ${LITESTREAM_BUCKET}
        path: brand3-db
        endpoint: ${LITESTREAM_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        region: auto
        # Keep snapshots for ~3 days; WAL segments apply continuously.
        retention: 72h
        sync-interval: 10s
